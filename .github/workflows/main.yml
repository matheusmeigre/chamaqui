name: Node.js CI

# Define os eventos que disparam o workflow
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x] # Testa em múltiplas versões do Node

    steps:
    # 1. Faz o checkout do código do repositório
    - uses: actions/checkout@v4
    
    # 2. Configura a versão do Node.js
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        
    # 3. Instala as dependências (ci é mais rápido e confiável que install para pipelines)
    - run: npm ci
    
    # 4. Executa o build da aplicação
    - run: npm run build --if-present
    
    # 5. Roda os testes automatizados
    - run: npm test --if-present
